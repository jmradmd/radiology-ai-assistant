version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rad-assist-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rad_assist
    ports:
      - "5432:5432"
    volumes:
      - rad_assist_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rad_assist_postgres_data:
