<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Mean TTFT, mean total response time, and p95 total time per model (warm runs)." font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><title>Response Latency by Model</title><desc>Mean TTFT, mean total response time, and p95 total time per model (warm runs).</desc><style>
      :root {
        --bg: #FFFFFF;
        --fg: #111827;
        --fg2: #4B5563;
        --subtitle: #6B7280;
