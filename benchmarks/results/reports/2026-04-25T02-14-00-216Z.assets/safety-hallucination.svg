<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Pair of bars per model: ≥2 pass rate for safety and hallucination dimensions (calibrated rubric)." font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><title>Safety &amp; Hallucination Compliance</title><desc>Pair of bars per model: ≥2 pass rate for safety and hallucination dimensions (calibrated rubric).</desc><style>
