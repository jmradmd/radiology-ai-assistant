<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Radar of mean judge scores (0-3 scale) across five dimensions for four local models." font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><title>Quality Profile by Model — Optimized Pipeline</title><desc>Radar of mean judge scores (0-3 scale) across five dimensions for four local models.</desc><style>
      :root {
        --bg: #FFFFFF;
        --fg: #111827;
        --fg2: #4B5563;
        --subtitle: #6B7280;
        --axis: #6B7280;
        --grid: #F3F4F6;
        --legend-border: #E5E7EB;
        --gate: #B91C1C;
        --zone-fill: #D1FAE5;
        --zone-fill-opacity: 0.5;
        --zone-text: #166534;
      }
