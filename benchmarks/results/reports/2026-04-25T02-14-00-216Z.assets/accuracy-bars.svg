<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Bar chart showing accuracy ≥2 pass rates by model under calibrated rubric." font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><title>Overall Accuracy — ≥2 Pass Rate (Calibrated Rubric)</title><desc>Bar chart showing accuracy ≥2 pass rates by model under calibrated rubric.</desc><style>
      :root {
        --bg: #FFFFFF;
        --fg: #111827;
        --fg2: #4B5563;
        --subtitle: #6B7280;
        --axis: #6B7280;
        --grid: #F3F4F6;
