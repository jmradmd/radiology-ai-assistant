      .chart-bar-heavy { fill: var(--tier-heavy); }
      .chart-errbar { stroke: var(--fg); stroke-width: 1.5; }
      .chart-scatter-stroke { stroke: var(--bg); stroke-width: 1.5; }
      .chart-line { fill: none; }
