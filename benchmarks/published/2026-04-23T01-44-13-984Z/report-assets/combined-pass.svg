<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Deployment-ready pass rate (latency ≤ 10s AND quality gate)" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><title>Deployment-ready pass rate (latency ≤ 10s AND quality gate)</title><desc>Bars sorted desc. Error bars = 95% bootstrap CI (5000 replicates, seed 42). Both gates must clear.</desc>
    <style>
