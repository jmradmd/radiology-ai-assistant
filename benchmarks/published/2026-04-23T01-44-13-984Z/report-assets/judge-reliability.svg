<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Inter-rater reliability — quadratic-weighted Cohen's κ" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><title>Inter-rater reliability — quadratic-weighted Cohen's κ</title><desc>Pass 1 = primary judge. Pass 2 &amp; 3 = independent Claude Opus 4.7 reasoning passes. Threshold κ ≥ 0.6.</desc>
    <style>
      :root {
        --bg: #FFFFFF;
        --fg: #111827;
        --fg2: #4B5563;
        --subtitle: #6B7280;
        --axis: #6B7280;
        --grid: #F3F4F6;
        --legend-border: #E5E7EB;
        --tier-light: #4C78A8;
        --tier-medium: #E45756;
        --tier-heavy: #54A24B;
        --gate: #B91C1C;
        --zone-fill: #D1FAE5;
        --zone-fill-opacity: 0.5;
        --zone-text: #166534;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0D1117;
          --fg: #F3F4F6;
          --fg2: #9CA3AF;
          --subtitle: #9CA3AF;
          --axis: #9CA3AF;
          --grid: #30363D;
          --legend-border: #374151;
          --gate: #F87171;
          --zone-fill: #14532D;
          --zone-fill-opacity: 0.45;
          --zone-text: #86EFAC;
        }
      }
