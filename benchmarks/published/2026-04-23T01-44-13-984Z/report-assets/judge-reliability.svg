      .chart-title { fill: var(--fg); font-size: 22px; font-weight: 700; }
      .chart-subtitle { fill: var(--subtitle); font-size: 14px; font-weight: 400; }
      .chart-axis-title { fill: var(--fg); font-size: 14px; font-weight: 600; }
